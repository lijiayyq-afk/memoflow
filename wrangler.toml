#:schema node_modules/wrangler/config-schema.json
name = "memoflow"
compatibility_date = "2024-04-03"
compatibility_flags = [ "nodejs_compat" ]
pages_build_output_dir = ".svelte-kit/cloudflare"

# D1 数据库绑定
[[d1_databases]]
binding = "DB"
database_name = "memoflow-db"
database_id = "5aae27f9-3852-47a8-a184-369edb9ce67b"
migrations_dir = "migrations"

# R2 存储桶绑定
# [[r2_buckets]]
# binding = "MEMOFLOW_R2"
# bucket_name = "memoflow-attachments"

# KV 命名空间绑定
[[kv_namespaces]]
binding = "MEMOFLOW_KV"
id = "18952ebd63dd4fd6a45e385847b20162"
